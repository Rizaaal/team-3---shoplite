<div class="admin-page-wrapper">

  <div class="container">



    <header class="admin-header mb-4" style="display: flex; justify-content: space-between; align-items: center;">

      <h1 style="font-weight: 800; font-size: 1.5rem;">Gestione Catalogo</h1>

      <button class="btn-back-compact" (click)="goBack()">Indietro</button>

    </header>



    <div class="admin-grid-top">

      <section class="white-card">

        <div class="card-header-compact">

          <h2>Nuovo Prodotto</h2>

        </div>

        <div class="form-balancer">

          <app-prodotto-form [loading]="loading()" (createProduct)="handleCreateProduct($event)" />

        </div>

      </section>



      <aside class="white-card">

        <div class="card-header-compact">

          <h2>Anteprima Live</h2>

        </div>

        <div class="preview-container">

          @if (product()) {

          <app-prodotto-preview [product]="product()" />

          } @else {

          <p style="color: #94a3b8; font-size: 0.9rem;">Inserisci i dati per vedere l'anteprima...</p>

          }

        </div>

      </aside>

    </div>



    <section class="white-card">

      <div class="card-header-compact">

        <h2>Prodotti in Inventario ({{ products().length }})</h2>

      </div>

      <div class="inventory-scroll">

        <app-prodotti-list [products]="products()" />

      </div>

    </section>



  </div>

</div>

<div *ngIf="products.length; else empty" class="products-grid">
  <article *ngFor="let p of products" class="product-list-card">
    <div class="product-list-image-box">
      <img [src]="p.image || ''" [alt]="p.nome" />
    </div>

    <div class="product-list-content">
      <div class="product-list-top">
        <span class="product-list-category">{{ p.categoria }}</span>
        <span class="product-list-stock">Stock: {{ p.stock }}</span>
      </div>

      <h3 class="product-list-title">{{ p.nome }}</h3>
      <p class="product-list-description">{{ p.descrizione }}</p>

      <div class="product-list-footer">
        <span class="product-list-price">€ {{ p.prezzo | number: '1.2-2' }}</span>
      </div>

      <div class="product-list-actions">
        <button
          type="button"
          class="btn-card-action btn-card-edit"
          [disabled]="loading"
          (click)="onEdit(p)"
        >
          Modifica
        </button>

        <button
          type="button"
          class="btn-card-action btn-card-delete"
          [disabled]="loading"
          (click)="onDelete(p)"
        >
          Elimina
        </button>
      </div>
    </div>
  </article>
</div>

<ng-template #empty>
  <div class="products-empty-state">
    <h3>Nessun prodotto</h3>
    <p>Non ci sono ancora prodotti da mostrare.</p>
  </div>
</ng-template>

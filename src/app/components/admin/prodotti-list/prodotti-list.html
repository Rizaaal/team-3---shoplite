<div *ngIf="products.length; else empty" class="inventory-list">
  <div *ngFor="let p of products" class="product-admin-item">

    <div class="product-admin-main">
      <div class="img-wrapper">
        <img [src]="p.image || 'assets/placeholder.png'" class="product-admin-img" />
      </div>

      <div class="product-admin-info">
        <h4>{{ p.nome }}</h4>
        <span class="category-badge">{{ p.categoria }}</span>
        <p class="description-truncate">{{ p.descrizione }}</p>
      </div>
    </div>

    <div class="product-admin-stats">
      <div class="stat-item">
        <span class="label">Prezzo</span>
        <span class="value">€ {{ p.prezzo }}</span>
      </div>
      <div class="stat-item">
        <span class="label">Stock</span>
        <span class="value">{{ p.stock }} pz</span>
      </div>
    </div>

  </div>
</div>

<ng-template #empty>
  <div class="empty-state">
    <p>Nessun prodotto presente nell'inventario.</p>
  </div>
</ng-template>

<form [formGroup]="form" (ngSubmit)="submit()" class="admin-form">



  <div class="form-group full-width">

    <label>Nome Prodotto</label>

    <input formControlName="nome" placeholder="Es: NVIDIA RTX 4090" />

  </div>



  <div class="form-group full-width">

    <label>Descrizione</label>

    <textarea formControlName="descrizione" placeholder="Descrivi le caratteristiche tecniche..." rows="3"></textarea>

  </div>



  <div class="form-group">

    <label>Prezzo (€)</label>

    <input type="number" formControlName="prezzo" placeholder="0.00" min="0" step="0.01" />

  </div>



  <div class="form-group">

    <label>Stock (Pezzi)</label>

    <input type="number" formControlName="stock" placeholder="Disponibilità" min="0" />

  </div>



  <div class="form-group">

    <label>Categoria</label>

    <select formControlName="categoria">

      <option value="">Seleziona...</option>

      <option *ngFor="let c of categories" [value]="c">{{ c }}</option>

    </select>

  </div>



  <div class="form-group">

    <label>Immagine Prodotto</label>

    <input type="file" (change)="onFileChange($event)" class="file-input" />

  </div>



  <button type="submit" [disabled]="loading" class="btn-submit">

    {{ loading ? 'Salvataggio...' : 'Crea prodotto' }}

  </button>

</form>

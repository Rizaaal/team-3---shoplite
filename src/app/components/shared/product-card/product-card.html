<article>
  <div class="image" [style.backgroundImage]="'url(' + product().image + ')'"></div>

  <div class="description">
    <div class="title">
      <h3>{{ product().nome }}</h3>
      <p class="price">€{{ product().prezzo }}</p>
    </div>

    <p class="category-text">{{ product().categoria }}</p>

    <div class="status-row">
      <div class="availability">
        <span
          class="tech-dot"
          [class.bg-success]="product().stock"
          [class.bg-danger]="!product().stock"
        ></span>
        <span
          class="status-label"
          [class.text-success]="product().stock"
          [class.text-danger]="!product().stock"
        >
          {{ product().stock ? 'Disponibile' : 'Esaurito' }}
        </span>
      </div>

      <p class="review">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="star-icon"
        >
          <path
            d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"
          ></path>
        </svg>
        4.8 <span>(342)</span>
      </p>
    </div>

    <button [disabled]="!product().stock" (click)="addToCart($event)" [class.added]="addedToCart()">
      @if (addedToCart()) {
        <app-star />
      } @else {
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#ffffff">
          <path
            d="M6.29977 5H21L19 12H7.37671M20 16H8L6 3H3M9 20C9 20.5523 8.55228 21 8 21C7.44772 21 7 20.5523 7 20C7 19.4477 7.44772 19 8 19C8.55228 19 9 19.4477 9 20ZM20 20C20 20.5523 19.5523 21 19 21C18.4477 21 18 20.5523 18 20C18 19.4477 18.4477 19 19 19C19.5523 19 20 19.4477 20 20Z"
            stroke="#ffffff"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></path>
        </svg>
      }

      {{ addedToCart() ? 'Aggiunto al carrello!' : 'Aggiungi al carrello' }}
    </button>
  </div>
</article>

<main>
  <h1>Pannello Admin</h1>

  <!-- template-driven form -->
  <form #prodForm="ngForm" (ngSubmit)="onSubmit(prodForm)">
    <div class="form-container">
      <h2>Aggiungi un nuovo prodotto</h2>

      <label> Nome Prodotto </label>
      <input name="name" [(ngModel)]="product.name" type="text" required />

      <label> Descrizione prodotto </label>
      <input name="description" [(ngModel)]="product.description" type="text" required />

      <label> Prezzo </label>
      <input name="price" [(ngModel)]="product.price" type="number" />

      <label> Quantità </label>
      <input name="qty" [(ngModel)]="product.qty" type="number" />

      <button type="submit" [disabled]="prodForm.invalid">Crea</button>
    </div>
  </form>

  <form #updateForm="ngForm" (ngSubmit)="onSubmitUpdate(updateForm)">
    <div class="form-container">
      <h2>Modifica prodotto</h2>

      <!-- seleziona l'id del prodotto da modificare -->
      <label>Id prodotto</label>
      <input #idInput type="text" (input)="productId.set(idInput.value)" required />

      <label>Nome Prodotto</label>
      <input name="name" [(ngModel)]="product.name" type="text" required />

      <label>Descrizione prodotto</label>
      <input name="description" [(ngModel)]="product.description" type="text" required />

      <label>Prezzo</label>
      <input name="price" [(ngModel)]="product.price" type="number" min="0" />

      <label>Quantità</label>
      <input name="qty" [(ngModel)]="product.qty" type="number" min="0" />

      <button type="submit" [disabled]="updateForm.invalid || updateForm.pristine">
        Salva modifiche
      </button>
    </div>
  </form>

  <form #deleteForm="ngForm" (ngSubmit)="onSubmitDelete(deleteForm)">
    <div class="form-container">
      <h2>Elimina un prodotto</h2>

      <!-- seleziona l'id del prodotto da modificare -->
      <label>Id prodotto</label>
      <input #idInput type="text" (input)="productId.set(idInput.value)" />

      <button type="submit" [disabled]="updateForm.invalid || updateForm.pristine">
        Elimina prodotto
      </button>
    </div>
  </form>
</main>

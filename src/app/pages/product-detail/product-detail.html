<div class="product-page">
    <div class="container-tech">
        <div class="main-layout">

            <div class="image-viewer">
                <div class="img-container">
                    <img [src]="product.image" [alt]="product.name">
                </div>
            </div>

            <div class="details-content">
                <h1>{{ product.name }}</h1>
                <span class="category-tag">{{ product.category }}</span>


                <div class="price-section">
                    <div class="main-price">€ {{ product.price }}</div>
                    <div class="rating-row">
                        <div class="stars">
                            <svg *ngFor="let i of [1,2,3,4,5]" width="18" height="18" viewBox="0 0 24 24" fill="#fbbf24"
                                stroke="#fbbf24">
                                <path
                                    d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z">
                                </path>
                            </svg>
                        </div>
                        <span class="reviews-count">{{ product.rating }} | {{ product.reviews }} recensioni</span>
                    </div>
                </div>

                <div class="availability">
                    <span class="status-dot" [class.available]="product.available"></span>
                    <span [class.text-green]="product.available">
                        {{ product.available ? 'Disponibile e pronto per la spedizione' : 'Attualmente non disponibile'
                        }}
                    </span>
                </div>

                <div class="separator"></div>

                <p class="description-text">{{ product.description }}</p>

                <div class="purchase-zone">
                    <button class="add-btn" [disabled]="!product.available" (click)="addToCart()">
                        Aggiungi al Carrello
                    </button>
                </div>
            </div>

        </div>

        <div class="carousel-section">
            <h2 class="section-title">Potrebbe interessarti anche</h2>
            <div class="carousel-placeholder">
            </div>
        </div>
    </div>
</div>

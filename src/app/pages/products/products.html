<div class="min-vh-100 bg-tech-main">
  <div class="container custom-container pb-5 mt-5">
    <div class="row g-4 g-lg-5">
      <aside class="col-lg-3">
        <div class="tech-sidebar p-4 sticky-top shadow-sm">
          <div class="mb-4">
            <h2 class="tech-label mb-3">CERCA</h2>
            <input
              type="text"
              class="form-control tech-input-sm"
              placeholder="Nome prodotto..."
              (input)="onSearchChange($any($event.target).value)"
            />
          </div>

          <h2 class="tech-label mb-4">CATEGORIE</h2>
          <div class="d-grid gap-2 mb-4">
            <button
              (click)="selectedCategories = []; applyFilters()"
              class="btn tech-btn-cat"
              [class.active]="selectedCategories.length === 0"
            >
              <span>Tutte</span>
              <span class="tech-badge">{{ products().length }}</span>
            </button>
            <button
              *ngFor="let cat of categories"
              (click)="toggleCategory(cat)"
              class="btn tech-btn-cat"
              [class.active]="selectedCategories.includes(cat)"
            >
              <span>{{ cat }}</span>
              <span class="tech-badge">{{ getCategoryCount(cat) }}</span>
            </button>
          </div>

          <div class="pt-4 border-top">
            <h2 class="tech-label mb-3">PREZZO</h2>
            <div class="row g-2 mb-4">
              <div class="col-6">
                <input
                  type="number"
                  class="form-control tech-input-sm"
                  placeholder="Min"
                  (input)="onMinPriceChange($any($event.target).value)"
                />
              </div>
              <div class="col-6">
                <input
                  type="number"
                  class="form-control tech-input-sm"
                  placeholder="Max"
                  (input)="onMaxPriceChange($any($event.target).value)"
                />
              </div>
            </div>
          </div>

          <div class="pt-4 border-top">
            <h2 class="tech-label mb-3">ORDINA PER</h2>
            <select class="form-select tech-select" (change)="onSortChange($event)">
              <option value="">Seleziona</option>
              <option value="name_asc">Nome A-Z</option>
              <option value="name_desc">Nome Z-A</option>
              <option value="price_asc">Prezzo crescente</option>
              <option value="price_desc">Prezzo decrescente</option>
            </select>
          </div>
        </div>
      </aside>

      <main class="col-lg-9">
        <div class="row row-cols-1 row-cols-sm-2 row-cols-xl-3 g-4">
          @if (productsService.products.isLoading()) {
            <p>... Caricamento</p>
          } @else if (productsService.products.error()) {
            <p>Errore</p>
          } @else {
            <div class="col" *ngFor="let product of filteredProducts">
              <app-product-card
                [product]="product"
                (click)="goToDetail(product.id)"
                style="cursor: pointer; display: block"
              >
              </app-product-card>
            </div>
          }
        </div>
      </main>
    </div>
  </div>
</div>
